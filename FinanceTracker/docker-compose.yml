services:
  postgres:
    image: postgres:16-alpine
    container_name: financetracker-postgres
    environment:
      POSTGRES_DB: financetracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financetracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: postgres:16-alpine
    container_name: financetracker-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    build:
      context: .
      dockerfile: docker/keycloak/Dockerfile
    container_name: financetracker-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy


  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financetracker-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Authentication__UseDevelopmentAuth: "false"
      Persistence__UseInMemory: "false"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=financetracker;Username=postgres;Password=postgres"
      Keycloak__BaseUrl: "http://keycloak:8080"
      Keycloak__Realm: "financetracker"
      Keycloak__ClientId: "financetracker-web"
      Keycloak__ClientSecret: "financetracker-web-secret"
      Keycloak__AdminClientId: "admin-cli"
      Keycloak__AdminUsername: "admin"
      Keycloak__AdminPassword: "admin"
      Keycloak__RequireHttpsMetadata: "false"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  postgres_data:
  keycloak_postgres_data:
