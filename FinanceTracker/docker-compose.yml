services:
  postgres:
    image: postgres:16-alpine
    container_name: financetracker-postgres
    environment:
      POSTGRES_DB: financetracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financetracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: postgres:16-alpine
    container_name: financetracker-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    build:
      context: .
      dockerfile: docker/keycloak/Dockerfile
    container_name: financetracker-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: financetracker-azurite
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0"
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financetracker-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Authentication__UseDevelopmentAuth: "false"
      Persistence__UseInMemory: "false"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=financetracker;Username=postgres;Password=postgres"
      AzuriteStorage__ConnectionString: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      AzuriteStorage__ReceiptsContainer: "receipts"
      GigaChatReceiptOcr__Enabled: "false"
      GigaChatReceiptOcr__IgnoreSslErrors: "true"
      GigaChatReceiptOcr__OAuthUrl: "https://ngw.devices.sberbank.ru:9443/api/v2/oauth"
      GigaChatReceiptOcr__ApiBaseUrl: "https://gigachat.devices.sberbank.ru/api/v1/"
      GigaChatReceiptOcr__AuthorizationKey: "Basic change_me"
      GigaChatReceiptOcr__Scope: "GIGACHAT_API_PERS"
      GigaChatReceiptOcr__Model: "GigaChat-2-Max"
      GigaChatReceiptOcr__TokenRefreshSkewSeconds: "60"
      GigaChatReceiptOcr__PromptTemplate: "Ты анализируешь изображение кассового чека. Доступные категории пользователя: {categories}. Верни ответ строго без пояснений и без markdown. Каждая сущность должна быть на новой строке. Формат строк: MERCHANT|<название магазина или пусто>\\nDATE|<дата в формате yyyy-MM-dd или пусто>\\nTOTAL|<итоговая сумма или пусто>|<код валюты или пусто>\\nITEM|<название товара>|<код валюты>|<цена>|<категория>. Используй только категории из переданного списка. Если подходящей категории нет, укажи Others."
      Keycloak__BaseUrl: "http://keycloak:8080"
      Keycloak__Realm: "financetracker"
      Keycloak__ClientId: "financetracker-web"
      Keycloak__ClientSecret: "financetracker-web-secret"
      Keycloak__AdminClientId: "admin-cli"
      Keycloak__AdminUsername: "admin"
      Keycloak__AdminPassword: "admin"
      Keycloak__RequireHttpsMetadata: "false"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      azurite:
        condition: service_started

volumes:
  postgres_data:
  keycloak_postgres_data:
  azurite_data:
